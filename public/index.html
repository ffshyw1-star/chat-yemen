<script>
    // 1. تعريف المتغيرات بشكل مستقل تماماً عن السيرفر لضمان عمل الأزرار فوراً
    let socket = null;
    let currentUser = { username: '', gender: 'male', role: 'guest', roleAr: 'زائر', room: '' };

    // محاولة الاتصال بالسوكت في الخلفية دون تعطيل المتصفح
    try {
        if (typeof io !== 'undefined') {
            socket = io();
            setupSocketListeners();
        } else {
            console.warn("جاري انتظار استيقاظ سيرفر Socket.io في الخلفية...");
        }
    } catch(e) {
        console.error("خطأ في بدء السوكت:", e);
    }

    // 2. دالة تنقل الشاشات (تعمل الآن فوراً وبشكل مستقل 100%)
    function showScreen(screenId) {
        const screens = ['welcomeScreen', 'visitorScreen', 'loginScreen', 'registerScreen', 'roomsScreen', 'chatScreen'];
        screens.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = 'none';
        });
        const activeEl = document.getElementById(screenId);
        if(activeEl) activeEl.style.display = 'flex';
    }

    function selectGender(element, gender) {
        document.querySelectorAll('.gender-opt').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
        currentUser.gender = gender;
    }

    function submitVisitor() {
        const nameInput = document.getElementById('visitorName').value.trim();
        if(!nameInput) {
            alert('الرجاء كتابة اسم مستعار أولاً!');
            return;
        }
        currentUser.username = nameInput;
        showScreen('roomsScreen'); // ستنقلك فوراً لشاشة الغرف
    }

    function joinRoom(roomKey) {
        currentUser.room = roomKey;
        document.getElementById('currentRoomTitle').innerText = `غرفة: ${roomKey.toUpperCase()}`;
        showScreen('chatScreen');
        
        // إذا استيقظ السوكت يتم إرسال الحدث، وإلا يدخل المستخدم الغرفة محلياً لحين الاتصال
        if(socket) {
            socket.emit('join_room', {
                room: currentUser.room,
                username: currentUser.username,
                roleAr: currentUser.roleAr
            });
        }
    }

    function leaveChat() { location.reload(); }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text) return;

        const timeNow = new Date().toLocaleTimeString('ar-YE', { hour: '2-digit', minute: '2-digit' });

        if(socket) {
            socket.emit('send_message', {
                room: currentUser.room,
                username: currentUser.username,
                gender: currentUser.gender,
                text: text,
                role: currentUser.role,
                time: timeNow,
                avatar: ''
            });
        } else {
            // إضافة الرسالة محلياً في واجهتك إذا كان السيرفر لا يزال يتصل
            appendMessage({ type: 'user', username: currentUser.username, gender: currentUser.gender, text: text, time: timeNow, role: currentUser.role });
        }
        input.value = '';
    }

    function handleKeyPress(event) { if(event.key === 'Enter') sendMessage(); }

    function unlockAdminPanel() {
        const password = prompt("الرجاء إدخال كلمة مرور الإدارة الموحدة:");
        if (password === "admin123") {
            currentUser.role = "admin";
            currentUser.roleAr = "المدير العام";
            document.getElementById('adminPanelBox').style.display = 'block';
            alert("تم تفعيل صلاحيات الإدارة!");
        } else {
            alert("كلمة المرور خاطئة!");
        }
    }

    function issueAdminKick() {
        const target = document.getElementById('targetKickUser').value.trim();
        if(!target || !socket) return;
        socket.emit('admin_kick', { room: currentUser.room, targetUser: target });
        document.getElementById('targetKickUser').value = '';
    }

    function issueClearRoom() {
        if(confirm("هل أنت متأكد من مسح المحادثات؟") && socket) {
            socket.emit('clear_room', { room: currentUser.room });
        }
    }

    // تجميع مستمعات السوكت لتعمل فقط عند نجاح الاتصال
    function setupSocketListeners() {
        socket.on('load_history', (history) => {
            const container = document.getElementById('chatMessages');
            if(container) {
                container.innerHTML = '';
                history.forEach(msg => appendMessage(msg));
            }
        });

        socket.on('receive_message', (msg) => { appendMessage(msg); });

        socket.on('user_banned', (data) => {
            if(currentUser.username === data.username) {
                alert("⚠️ لقد تم طردك وحظرك!");
                location.reload();
            }
        });

        socket.on('room_cleared', () => {
            const container = document.getElementById('chatMessages');
            if(container) container.innerHTML = '<div class="system-msg">⚙️ تم تصفير المحادثات</div>';
        });
    }

    function appendMessage(msg) {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        
        if(msg.type === 'system') {
            const sysDiv = document.createElement('div');
            sysDiv.className = 'system-msg';
            sysDiv.innerText = msg.text;
            container.appendChild(sysDiv);
        } else {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg-container';
            let nameColor = msg.gender === 'female' ? 'var(--female-color)' : '#0284c7';
            let roleBadge = msg.role === 'admin' ? '<span class="badge-owner">المدير 🛡️</span>' : '<span class="badge-vip">زائر</span>';

            msgDiv.innerHTML = `
                <div class="user-avatar"><img src="https://ui-avatars.com{encodeURIComponent(msg.username)}&background=random" alt="avatar"></div>
                <div class="msg-content-area">
                    <span class="msg-username" style="color: ${nameColor}">${msg.username} ${roleBadge}</span>
                    <span class="msg-text">${msg.text}</span>
                    <span class="msg-time">${msg.time || ''}</span>
                </div>
            `;
            container.appendChild(msgDiv);
        }
        container.scrollTop = container.scrollHeight;
    }
</script>
