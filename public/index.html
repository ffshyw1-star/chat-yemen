<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن | شات اليمن العربي</title>
<link href="https://googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cloudflare.com">
<style>
:root {
  --main-blue: #002e3c;
  --dark-nav: #091c24;
  --text-gray: #a6a6a6;
  --border-color: #f1f1f1;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
body { background: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.hide { display: none !important; }

/* الهيدر العلوي الازرق */
.top-bar {
  background: var(--main-blue);
  color: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 55px;
}
.top-bar-right { display: flex; align-items: center; gap: 15px; }
.top-bar-right i { font-size: 20px; cursor: pointer; }
.top-bar-center { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
.top-bar-center .store-btn { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.top-bar-left { display: flex; align-items: center; gap: 18px; }
.top-bar-left i { font-size: 18px; cursor: pointer; position: relative; }
.top-bar-left img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #fff; }

/* مساحة الشات الرئيسية */
.chat-container { flex: 1; display: flex; flex-direction: column; background: #ffffff; overflow: hidden; }
.messages-box { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; }

/* التخطيط الهندسي المماثل للصورة تماماً */
.message-row {
  display: flex;
  flex-direction: row-reverse; /* لقلب العناصر: الوقت يمين، الصورة يسار */
  align-items: flex-start;
  padding: 12px 8px;
  border-bottom: 1px solid #f9f9f9;
  width: 100%;
}

/* القسم الأيمن: التوقيت والنقاط الثلاثة */
.msg-time-meta {
  width: 110px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  font-size: 11px;
  color: var(--text-gray);
  flex-shrink: 0;
  padding-top: 4px;
}
.msg-time-meta .dots { font-size: 12px; font-weight: bold; letter-spacing: 1px; color: #ccc; }

/* القسم الأوسط: المحتوى والاسم */
.msg-content-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end; /* لتبدأ النصوص من جهة اليسار بمحاذاة الصورة */
  text-align: right;
  padding-left: 12px;
}
.user-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
}
.user-msg-text {
  font-size: 14.5px;
  line-height: 1.5;
  color: #222;
  word-break: break-word;
}

/* وسم النظام والرتب */
.system-join-text { color: #002e3c; font-size: 14px; font-weight: 600; }
.r-visitor { color: #ff3b30; font-weight: bold; }
.r-vip { color: #ff007f; font-weight: bold; }

/* القسم الأيسر: الصورة الشخصية (الأفاتار) */
.user-avatar-img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid #e0e0e0;
}

/* شريط الكتابة السفلي الدائري المتناسق */
.input-area-bar {
  background: #ffffff;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--border-color);
}
.plus-icon-btn {
  color: #7f8c8d;
  font-size: 20px;
  cursor: pointer;
  background: none;
  border: none;
}
.input-wrapper-inner {
  flex: 1;
  display: flex;
  align-items: center;
  background: #f1f3f4;
  border-radius: 24px;
  padding: 4px 12px;
  gap: 8px;
}
.input-wrapper-inner input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 8px 4px;
  font-size: 15px;
}
.input-wrapper-inner button {
  background: transparent;
  border: none;
  color: #7f8c8d;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.input-wrapper-inner .send-btn { color: #0084ff; }

/* القائمة السفلية الداكنة مطابقة للصورة تماماً */
.bottom-nav-menu {
  background: var(--dark-nav);
  display: flex;
  height: 55px;
}
.nav-menu-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #ffffff;
  text-decoration: none;
  font-size: 11px;
  gap: 3px;
  opacity: 0.6;
  cursor: pointer;
}
.nav-menu-item i { font-size: 18px; }
.nav-menu-item.active { opacity: 1; color: #00cc99; }
.nav-menu-item.active span { color: #ffffff; }
.nav-menu-item .label-sub { font-size: 9px; color: #8a9aa4; display: block; margin-top: -2px; }

/* صناديق الاختيارات المنبثقة */
.emoji-popup {
  position: absolute; bottom: 125px; right: 15px;
  background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  padding: 10px; width: 280px; height: 180px; overflow-y: auto; z-index: 100;
}
.emoji-popup span { font-size: 22px; padding: 4px; cursor: pointer; display: inline-block; }
</style>
</head>
<body>

  <!-- شريط العناوين والتحكم العلوي (الأزرق) -->
  <div class="top-bar">
    <div class="top-bar-right">
      <i class="fa fa-bars"></i>
    </div>
    <div class="top-bar-center">
      <div class="store-btn">
        <i class="fa fa-shopping-basket"></i> Store.
      </div>
    </div>
    <div class="top-bar-left">
      <i class="fa fa-envelope"></i>
      <i class="fa fa-user-plus"></i>
      <i class="fa fa-heart"></i>
      <img src="https://imgur.com" alt="بروفايل">
    </div>
  </div>

  <!-- صندوق محادثات الغرفة الاستهدافي -->
  <div class="chat-container">
    <div class="messages-box" id="messages_container">
      
      <!-- رسالة 1: تطابق رسالة "الزعيم" بالصورة بالملي -->
      <div class="message-row">
        <div class="msg-time-meta">
          <span class="dots">...</span> 11:22 م
        </div>
        <div class="msg-content-center">
          <div class="user-name" style="color: #bf55ec;">الـزعـيـم</div>
          <div class="user-msg-text" style="color: #ff007f; font-weight: bold;">
            000ALEXECUTIONERRRR ياخي ليش عندي النسخ موقف مدري ماله
          </div>
        </div>
        <img src="https://imgur.com" class="user-avatar-img">
      </div>

      <!-- رسالة 2: انضمام مستخدم رتبة زائر (لولوه) -->
      <div class="message-row">
        <div class="msg-time-meta">
          <span class="dots">...</span> 11:21 م
        </div>
        <div class="msg-content-center">
          <div class="user-name" style="color: #5c97bf;">لوالواه</div>
          <div class="user-msg-text system-join-text">
            هذا المستخدم انضم للغرفة <span class="r-visitor">[ رتبة زائر ]</span>
          </div>
        </div>
        <img src="https://placeholder.com" class="user-avatar-img">
      </div>

      <!-- رسالة 3: انضمام مستخدم رتبة مميز (Silya17) -->
      <div class="message-row">
        <div class="msg-time-meta">
          <span class="dots">...</span> 11:20 م
        </div>
        <div class="msg-content-center">
          <div class="user-name" style="color: #222;">Silya17</div>
          <div class="user-msg-text system-join-text">
            هذا المستخدم انضم للغرفة <span class="r-vip">[ رتبة مميز ]</span>
          </div>
        </div>
        <img src="https://placeholder.com" class="user-avatar-img">
      </div>

    </div>

    <!-- شريط إدخال الرسائل السفلي -->
    <div class="input-area-bar">
      <button class="plus-icon-btn" id="plus_btn"><i class="fa fa-plus"></i></button>
      <div class="input-wrapper-inner">
        <button id="emoji_btn"><i class="fa-regular fa-face-smile"></i></button>
        <input type="text" id="chat_input_field" placeholder="اكتب هنا..." autocomplete="off">
        <button id="mic_btn"><i class="fa fa-microphone"></i></button>
        <button id="send_msg_btn" class="send-btn hide"><i class="fa fa-paper-plane"></i></button>
      </div>
    </div>

    <!-- نافذة الايموجي المنبثقة الذكية -->
    <div class="emoji-popup hide" id="emoji_box_popup"></div>

    <!-- القائمة السفلية الداكنة مطابقة للمتواجدين والغرف -->
    <div class="bottom-nav-menu">
      <div class="nav-menu-item active">
        <i class="fa fa-users"></i>
        <span>المتواجدين</span>
      </div>
      <div class="nav-menu-item">
        <i class="fa fa-comments"></i>
        <span>الغرف</span>
      </div>
      <div class="nav-menu-item">
        <i class="fa fa-gear"></i>
        <span>خيارات</span>
      </div>
      <div class="nav-menu-item">
        <i class="fa fa-play-circle"></i>
        <span>محطة</span>
        <span class="label-sub">Araby.Chat</span>
      </div>
    </div>

  </div>

<script>
const chatInputField = document.getElementById('chat_input_field');
const sendMsgBtn = document.getElementById('send_msg_btn');
const micBtn = document.getElementById('mic_btn');
const messagesContainer = document.getElementById('messages_container');
const emojiBtn = document.getElementById('emoji_btn');
const emojiBoxPopup = document.getElementById('emoji_box_popup');

// تبديل زر الإرسال والميكروفون عند الكتابة
chatInputField.addEventListener('input', function() {
  if (this.value.trim() !== "") {
    sendMsgBtn.classList.remove('hide');
    micBtn.classList.add('hide');
  } else {
    sendMsgBtn.classList.add('hide');
    micBtn.classList.remove('hide');
  }
});

// إرسال رسالة حية بنفس التصميم الهندسي المطلوب
function triggerSendMessage() {
  const text = chatInputField.value.trim();
  if(!text) return;

  const now = new Date();
  const timeString = now.toLocaleTimeString('ar-YE', { hour: '2-digit', minute: '2-digit' });

  const msgRow = document.createElement('div');
  msgRow.className = 'message-row';
  msgRow.innerHTML = `
    <div class="msg-time-meta">
      <span class="dots">...</span> ${timeString}
    </div>
    <div class="msg-content-center">
