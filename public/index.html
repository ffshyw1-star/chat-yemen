<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات كتابي عربي احترافي</title>
    <!-- استدعاء مكتبة Socket.io الخاصة بالفرونت إند -->
    <script src="https://socket.io"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        #chat-window { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        #messages-box { height: 400px; overflow-y: auto; padding: 15px; background: #efeae2; display: flex; flex-direction: column; }
        .msg { max-width: 75%; padding: 8px 12px; margin: 5px 0; border-radius: 8px; font-size: 15px; position: relative; }
        .msg.received { background: #ffffff; align-self: flex-start; border-top-right-radius: 0; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; border-top-left-radius: 0; }
        .msg .meta { font-size: 11px; color: #667781; margin-top: 4px; text-align: left; }
        .msg .user { font-weight: bold; color: #128c7e; font-size: 13px; display: block; margin-bottom: 2px; }
        .system { text-align: center; color: #667781; font-size: 13px; margin: 8px 0; font-style: italic; }
        #input-area { display: flex; padding: 10px; background: #f0f2f5; }
        #input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; padding-right: 15px; }
        #input-area button { background: #00a884; color: #fff; border: none; padding: 0 20px; margin-right: 5px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <!-- صندوق الرسائل -->
    <div id="messages-box"></div>
    
    <!-- منطقة إرسال الرسائل -->
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا... (جرب س1 للاختصار)" onkeypress="checkEnter(event)">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    // الاتصال بسيرفر النود المحلي (تأكد من تعديل الرابط عند الرفع أونلاين)
    const socket = io("http://localhost:3000");

    // بيانات تجريبية (يتم جلبها ديناميكياً بعد تسجيل الدخول عبر PHP)
    const currentUser = {
        username: "عضو_يمني_" + Math.floor(Math.random() * 1000),
        role: "عضو",
        room_id: "main_room"
    };

    // الدخول الفوري للغرفة عند فتح الصفحة
    socket.emit('join_room', currentUser);

    // استقبال الرسائل العامة والخاصة من السيرفر وعرضها
    socket.on('receive_message', (data) => {
        const msgBox = document.getElementById('messages-box');
        const isMe = data.username === currentUser.username;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
        
        msgDiv.innerHTML = `
            ${!isMe ? `<span class="user">[${data.role}] ${data.username}</span>` : ''}
            <div>${data.text}</div>
            <div class="meta">${data.time}</div>
        `;
        
        msgBox.appendChild(msgDiv);
        msgBox.scrollTop = msgBox.scrollHeight; // النزول التلقائي لآخر رسالة
    });

    // استقبال رسائل النظام (دخول وخروج الأعضاء)
    socket.on('system_message', (data) => {
        const msgBox = document.getElementById('messages-box');
        const sysDiv = document.createElement('div');
        sysDiv.className = 'system';
        sysDiv.innerText = data.text;
        msgBox.appendChild(sysDiv);
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    // وظيفة إرسال الرسالة
    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (text !== "") {
            socket.emit('send_message', { text: text });
            input.value = ""; // تفريغ الحقل
        }
    }

    function checkEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
