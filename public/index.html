<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شات اليمن العربي | الخادم الرئيسي</title>
<link href="https://googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cloudflare.com">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
    --main: #0f414e;
    --green: #74b20e;
    --chat-bg: #e5ddd5;
    --msg-me: #dcf8c6;
    --msg-other: #fff;
    --user-font: 'Tajawal';
    --user-color: #000;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--user-font), sans-serif; }
body { background: #ededed; overflow: hidden; height: 100vh; }
button { cursor: pointer; border: none; }
.hide { display: none !important; }

.header { background: var(--main); padding: 15px; text-align: center; }
.header > a { color: #fff; font-size: 28px; font-weight: 700; text-decoration: none; }
.header > b { display: block; color: #ccc; font-size: 14px; font-weight: 400; margin-top: 5px; }
.main { background: #00242e url('https://unsplash.com') no-repeat center fixed; background-size: cover; min-height: calc(100vh - 80px); padding: 20px; display: flex; align-items: center; justify-content: center; }
.container { max-width: 1050px; width: 100%; text-align: center; }

.welcome-box { background: rgba(255, 255, 255, .96); max-width: 450px; width: 100%; margin: auto; border-radius: 15px; padding: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); text-align: center; }
.welcome-box h3 { margin-bottom: 10px; color: var(--main); font-size: 22px; }
.welcome-box p { color: #555; margin-bottom: 20px; font-size: 14px; }

.auth-tabs { display: flex; background: #eee; border-radius: 8px; padding: 4px; margin-bottom: 20px; }
.auth-tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 14px; transition: 0.2s; color: #555; }
.auth-tab.active { background: #fff; color: var(--main); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

.login-form input[type="text"], .login-form input[type="password"] { width: 100%; padding: 12px; text-align: center; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; outline: none; transition: 0.3s; }
.login-form input:focus { border-color: var(--green); background: #fff; }

.btn { display: block; width: 100%; color: #fff; background: var(--main); padding: 12px; border-radius: 10px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
#submit_btn { background: var(--green); }

.gendiv { display: flex; justify-content: center; gap: 30px; margin: 15px 0; font-weight: bold; }
.male { color: #0066ff; } .female { color: #ee1133; }
.error { display: none; margin: 10px auto; padding: 10px; background: #fff0f0; color: red; border-radius: 8px; border: 1px solid red; max-width: 450px; font-weight: bold; }

#chat_app { display: none; height: 100vh; max-width: 1400px; margin: auto; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
.chat-layout { display: flex; height: 100%; position: relative; }

.sidebar { width: 320px; border-left: 1px solid #ddd; display: flex; flex-direction: column; background: #f5f6f6; z-index: 5; transition: 0.3s; }
.sidebar-header { background: var(--main); color: #fff; padding: 15px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.settings-btn { background: rgba(255, 255, 255, .2); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 3px; cursor: pointer; }
.room-tabs { display: flex; background: #e9edef; overflow-x: auto; }
.room-tab { flex: 1; padding: 12px 5px; text-align: center; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; font-weight: bold; color: #555; }
.room-tab.active { background: #fff; border-color: var(--green); color: var(--main); }

.users-list { flex: 1; overflow-y: auto; background: #fff; }
.user-item { padding: 10px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; position: relative; }
.user-item:hover, .user-item.pm-active { background: #e9edef; }
.user-avatar { width: 42px; height: 42px; border-radius: 50%; color: #fff; display: grid; place-items: center; font-weight: 700; flex-shrink: 0; font-size: 18px; }
.user-avatar.m { background: #0066ff; } .user-avatar.f { background: #ee1133; }
.user-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.user-name { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
.admin-tag { font-size: 9px; background: gold; color: #000; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
.pm-badge { background: red; color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: bold; margin-right: auto; }

.admin-btns { display: flex; gap: 5px; margin-right: auto; }
.admin-btns i { font-size: 15px; color: #777; padding: 4px; cursor: pointer; transition: 0.2s; }
.admin-btns i:hover { transform: scale(1.2); color: red; }

.chat-area { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
.chat-header { background: var(--main); color: #fff; padding: 13px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.chat-header h4 { font-size: 18px; color: #fff; font-weight: bold; }
.logout-btn { background: rgba(255, 255, 255, .2); color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 14px; display: flex; align-items: center; gap: 5px; font-weight: bold; }
#show_users_btn { display: none; }

.messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: url('https://githubusercontent.com'); }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; word-wrap: break-word; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 16px; }
.msg.me { background: var(--msg-me); align-self: flex-start; border-top-right-radius: 0; }
.msg.other { background: var(--msg-other); align-self: flex-end; border-top-left-radius: 0; }
.msg.system { background: rgba(0,0,0,0.4); color: #fff; align-self: center; text-align: center; font-size: 13px; border-radius: 20px; padding: 6px 18px; box-shadow: none; max-width: 90%; font-weight: bold; }
.msg.pm { border: 2px dashed #74b20e; background: #f0fdf4 !important; }
.msg-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; display: block; }
.msg img.chat-img { max-width: 100%; width: 240px; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; }
.msg audio { width: 230px; max-width: 100%; margin-top: 5px; display: block; }
.msg-time { font-size: 10px; color: #778899; text-align: left; margin-top: 5px; display: block; }

.chat-input { background: #f0f0f0; padding: 12px; display: flex; gap: 8px; align-items: center; position: relative; border-top: 1px solid #ddd; }
.chat-input input[type="text"] { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 16px; }
.chat-input button { width: 44px; height: 44px; border-radius: 50%; background: var(--green); color: #fff; font-size: 18px; flex-shrink: 0; display: grid; place-items: center; }
.icon-btn { background: #fff !important; color: #555 !important; border: 1px solid #ddd !important; }
.recording-active { background: red !important; color: white !important; animation: recPulse 1s infinite; }

.popup { position: absolute; bottom: 70px; background: #fff; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.25); padding: 15px; z-index: 15; display: none; border: 1px solid #ddd; }
.emoji-box { right: 15px; width: 300px; height: 220px; overflow-y: auto; }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
.emoji-grid span { font-size: 26px; text-align: center; cursor: pointer; }

.settings-box { right: 70px; width: 300px; text-align: right; }
.settings-box label { font-weight: bold; font-size: 13px; display: block; margin: 10px 0 4px; color: #444; }
.color-picker { display: flex; flex-wrap: wrap; gap: 6px; }
.color-picker span { width: 26px; height: 26px; display: inline-block; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 3px rgba(0,0,0,0.3); }
.color-picker span.selected { border-color: #000; transform: scale(1.1); }
.font-picker select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; outline: none; }

.bans-box { left: 15px; top: 70px; bottom: auto; width: 300px; max-height: 350px; overflow-y: auto; }
.ban-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
.unban-btn { background: #d32f2f; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }

@keyframes recPulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
@media (max-width: 768px) {
    #show_users_btn { display: flex; }
    .sidebar { display: none; position: absolute; top: 0; bottom: 0; right: 0; height: 100%; width: 280px; box-shadow: -5px 0 15px rgba(0,0,0,0.25); }
    .sidebar.active { display: flex; }
    .msg { max-width: 88%; }
}
</style>
</head>
<body>

<div id="login_page">
  <div class="header"><a href="#">شات اليمن العربي</a><b>أكبر تجمع يمني متصل الآن</b></div>
  <div class="main">
    <div class="container">
      <div class="error" id="error"></div>
