*{

padding:0;

header{

display:flex;

#notificationCount{

top:-8px;

left:-8px;

width:18px;

font-size:11px;

display:flex;

justify-content:center;

.container{

display:flex;

}

.sidebar{

background:white;

border-left:1px solid #ddd;

overflow:auto;

}

.sidebar h3{

padding:15px;

background:#128C7E;

}

.room{

padding:12px;

cursor:pointer;

transition:.2s;

}

.room:hover{

background:#f5f5f5;

}

.chat-area{

flex:1;

display:flex;

}

.messages{

overflow:auto;

padding:15px;

}

.message{

padding:10px;

margin-bottom:10px;

border-radius:8px;

max-width:75%;

box-shadow:0 1px 3px rgba(0,0,0,.1);

}

.mine{

margin-right:auto;

background:#dcf8c6;

}

.other{

margin-left:auto;

}

.user{

font-weight:bold;

color:#075E54;

margin-bottom:5px;

}

.time{

font-size:11px;

color:#666;

margin-top:5px;

}

.input-area{

display:flex;

padding:10px;

background:#f0f0f0;

gap:8px;

}

.input-area input{

flex:1;

padding:12px;

border:none;

border-radius:8px;

outline:none;

font-size:15px;

}

.input-area button{

padding:12px 18px;

border:none;

border-radius:8px;

background:#128C7E;

color:white;

cursor:pointer;

font-size:15px;

}

.user-popup{

display:none;

position:fixed;

top:80px;

left:20px;

width:320px;

background:white;

border-radius:12px;

box-shadow:0 0 20px rgba(0,0,0,.25);

padding:15px;

z-index:999;

max-height:420px;

overflow:auto;

}

.user-popup h3{

margin-bottom:10px;

color:#075E54;

}

@media(max-width:900px){

<!-- بداية JavaScript -->

<script>

const socket = io();

let currentRoom = 1;

let notificationCount = 0;

const userId =

localStorage.getItem("user_id");

const username =

localStorage.getItem("username");

socket.emit(

"register_user",

userId

);

socket.emit(

"join_room",

currentRoom

);
// ======================================
// تحميل الغرف
// ======================================

async function loadRooms(){

    try{

        const res = await fetch("/api/rooms");

        const rooms = await res.json();

        const box = document.getElementById("rooms");

        box.innerHTML = "";

        rooms.forEach(room=>{

            box.innerHTML += `
            <div class="room"
            onclick="joinRoom(${room.id})">

                ${room.icon} ${room.name}

            </div>
            `;

        });

    }catch(err){

        console.error(err);

    }

}

// ======================================
// دخول غرفة
// ======================================

function joinRoom(roomId){

    socket.emit("leave_room",currentRoom);

    currentRoom = roomId;

    document.getElementById("messages").innerHTML = "";

    socket.emit("join_room",currentRoom);

}

// ======================================
// إرسال رسالة
// ======================================

function sendMessage(){

    const input = document.getElementById("messageInput");

    const text = input.value.trim();

    if(text==="") return;

    socket.emit("chat_message",{

        room:currentRoom,

        user_id:userId,

        username:username,

        message:text

    });

    input.value="";

}

// Enter للإرسال

document
.getElementById("messageInput")
.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        sendMessage();

    }

});

// ======================================
// استقبال الرسائل
// ======================================

socket.on("chat_message",(msg)=>{

    const messages =
    document.getElementById("messages");

    const mine =
    msg.user_id==userId;

    messages.innerHTML += `

    <div class="message ${mine?'mine':'other'}">

        <div class="user">

            👤 ${msg.username}

        </div>

        <div>

            ${msg.message}

        </div>

        <div class="time">

            ${new Date().toLocaleTimeString()}

        </div>

    </div>

    `;

    messages.scrollTop =
    messages.scrollHeight;

});

// ======================================
// المستخدمون المتصلون
// ======================================

socket.on("online_users",(users)=>{

    const box =
    document.getElementById("onlineUsers");

    box.innerHTML="";

    users.forEach(user=>{

        box.innerHTML += `

        <div style="padding:8px;border-bottom:1px solid #eee;cursor:pointer"

        onclick="showProfile(${user.id})">

            🟢 ${user.username}

        </div>

        `;

    });

});

// ======================================
// بدء التحميل
// ======================================

loadRooms();

function closePopups(){

    document

}

document.addEventListener("click",function(e){

    if(e.target.classList.contains("user-popup")){

window.onload = function(){
