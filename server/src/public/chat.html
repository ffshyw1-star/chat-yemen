<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>شات اليمن المطور</title>

<script src="/socket.io/socket.io.js"></script>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Tajawal,Tahoma,Arial;
background:#f3f3f3;
height:100vh;
display:flex;
flex-direction:column;

}



/* الشريط العلوي */

.top-bar{

height:60px;
background:#222;
color:white;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 12px;

}



.site-name{

font-size:18px;
font-weight:bold;

}



.top-icons{

display:flex;
gap:12px;

}



.icon{

font-size:23px;
cursor:pointer;

}




/* الغرفة */


.room-header{

background:white;

padding:10px;

text-align:center;

border-bottom:1px solid #ddd;

font-weight:bold;

}




/* الرسائل */


.messages{

flex:1;

overflow-y:auto;

padding:10px;

}



.message{

display:flex;

gap:10px;

background:white;

padding:10px;

margin-bottom:10px;

border-radius:12px;

}



.avatar{

width:45px;

height:45px;

border-radius:50%;

background:#ddd;

display:flex;

align-items:center;

justify-content:center;

}



.username{

font-weight:bold;

cursor:pointer;

}



.time{

font-size:12px;

color:#777;

}





.system-message{

text-align:center;

color:#555;

padding:10px;

}





/* الكتابة */


.input-bar{

height:60px;

background:#ddd;

display:flex;

align-items:center;

gap:8px;

padding:8px;

}



.input-bar input{

flex:1;

height:42px;

border:0;

border-radius:20px;

padding:10px;

}



.send-btn{

font-size:25px;

cursor:pointer;

}





/* الشريط السفلي */


.bottom-bar{

height:55px;

background:white;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #ddd;

}





/* المتواجدين */


.users-panel{

position:fixed;

top:0;

right:-320px;

width:300px;

height:100%;

background:white;

z-index:30;

transition:.3s;

box-shadow:0 0 10px #777;

}



.users-panel.open{

right:0;

}



.users-header{

background:#222;

color:white;

padding:15px;

display:flex;

justify-content:space-between;

}



.user-item{

display:flex;

align-items:center;

gap:10px;

padding:12px;

border-bottom:1px solid #ddd;

cursor:pointer;

}



.user-image{

width:45px;

height:45px;

border-radius:50%;

background:#ddd;

display:flex;

align-items:center;

justify-content:center;

}




/* بوكس المستخدم */


.user-popup{

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:280px;

background:white;

border-radius:15px;

padding:20px;

display:none;

z-index:50;

box-shadow:0 0 15px #555;

text-align:center;

}



.popup-image{

width:80px;

height:80px;

background:#ddd;

border-radius:50%;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

}



.user-popup button{

width:100%;

padding:10px;

margin-top:8px;

border:0;

border-radius:10px;

cursor:pointer;

}




/* نافذة الأمر */


#commandBox{

display:none;

}



.command-title{

font-size:20px;

font-weight:bold;

margin-bottom:10px;

}


</style>

</head>



<body>


<!-- الشريط العلوي -->

<div class="top-bar">


<div class="site-name">

شات اليمن المطور

</div>



<div class="top-icons">


<span class="icon">☰</span>

<span class="icon">🛒</span>

<span class="icon">✉️</span>


<span class="icon"
onclick="openUsers()">

👥

</span>


<span class="icon">❤️</span>

<span class="icon">📭</span>


<span class="icon">👤</span>
<script>


const socket = io();



const username =
localStorage.getItem("username")
||
"زائر";


const room =
localStorage.getItem("room_id")
||
1;



const rank =
localStorage.getItem("rank")
||
"guest";



let selectedUser = "";

let selectedUserId = "";





// دخول الغرفة

socket.emit(
"join_room",
{

room,

username

}

);






// استقبال الرسائل العامة

socket.on(
"receive_message",
(data)=>{


addMessage(
data.username,
data.message,
data.time
);


});






// رسائل النظام

socket.on(
"system_message",
(msg)=>{


let box =
document.getElementById(
"messages"
);



box.innerHTML +=

`

<div class="system-message">

[ ${msg} ]

</div>

`;



box.scrollTop =
box.scrollHeight;


});








// إرسال رسالة

function sendMessage(){


let input =
document.getElementById(
"messageInput"
);



let message =
input.value.trim();



if(!message)
return;



socket.emit(
"send_message",
{

room,

username,

message

}

);



input.value="";


}







// عرض الرسالة


function addMessage(
name,
text,
time
){


let box =
document.getElementById(
"messages"
);



box.innerHTML +=

`

<div class="message">


<div class="avatar">

👤

</div>


<div>


<div class="username"
onclick="showUser('${name}')">

${name}

</div>



<div>

${text}

</div>



<div class="time">

${time || getTime()}

</div>


</div>



</div>


`;



box.scrollTop =
box.scrollHeight;


}






function getTime(){


let d=new Date();


return (

String(d.getHours())
.padStart(2,"0")

+

":"

+

String(d.getMinutes())
.padStart(2,"0")

);


}









// ======================
// المتواجدين
// ======================


function openUsers(){


document
.getElementById(
"usersPanel"
)
.classList.add("open");


}



function closeUsers(){


document
.getElementById(
"usersPanel"
)
.classList.remove("open");


}







socket.on(
"online_users",
(users)=>{


let list =
document.getElementById(
"usersList"
);



list.innerHTML="";



users.forEach(
(user)=>{


list.innerHTML +=


`

<div class="user-item"
onclick="showUser('${user.username}')">


<div class="user-image">

👤

</div>



<div>

${user.username}

</div>



</div>


`;



});



});









// ======================
// بوكس المستخدم
// ======================


function showUser(name){


selectedUser=name;



document.getElementById(
"userPopup"
)
.style.display="block";



document.getElementById(
"popupName"
)
.innerHTML=name;



document.getElementById(
"popupInfo"
)
.innerHTML=

"20 سنة ذكر 🇾🇪";





// إظهار زر الأمر حسب الرتبة


if(

rank==="owner"

||

rank==="superadmin"

||

rank==="admin"

||

rank==="moderator"

){


document.getElementById(
"commandBtn"
)
.style.display="block";


}
else{


document.getElementById(
"commandBtn"
)
.style.display="none";


}



}





// إغلاق البوكس


document.addEventListener(
"click",
(e)=>{


let popup =
document.getElementById(
"userPopup"
);



if(

popup.style.display==="block"

&&

!popup.contains(e.target)

&&

!e.target.classList.contains("username")

){


popup.style.display="none";


}



});







// الملف الشخصي


function openProfile(){


location.href=

"profile.html?user="+selectedUser;


}





// الخاص


function openPrivate(){


location.href=

"private.html?user="+selectedUser;


}






// فتح الأوامر


function showCommands(){


document.getElementById(
"userPopup"
)
.style.display="none";



document.getElementById(
"commandBox"
)
.style.display="block";


}




</script>
</body>
</html>
