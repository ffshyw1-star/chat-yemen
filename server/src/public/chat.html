<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>شات اليمن المطور</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap"
rel="stylesheet">

<script src="/socket.io/socket.io.js"></script>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Tajawal',sans-serif;

}

body{

background:#ece5dd;

height:100vh;

overflow:hidden;

}

/*==========================
الشريط العلوي
==========================*/

.header{

height:65px;

background:#075E54;

color:#fff;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 12px;

box-shadow:0 2px 5px rgba(0,0,0,.2);

}

.title{

font-size:22px;

font-weight:bold;

}

.top-icons{

display:flex;

gap:18px;

font-size:22px;

cursor:pointer;

align-items:center;

}

.top-icons span{

transition:.2s;

}

.top-icons span:hover{

transform:scale(1.15);

}

/*==========================
منطقة الرسائل
==========================*/

.messages{

height:calc(100vh - 140px);

overflow-y:auto;

padding:15px;

background:#d9dbd5;

}

.message{

background:#fff;

padding:12px;

border-radius:12px;

margin-bottom:15px;

display:flex;

gap:10px;

box-shadow:0 2px 4px rgba(0,0,0,.08);

}

.avatar{

width:48px;

height:48px;

border-radius:50%;

background:#ddd;

object-fit:cover;

}

.message-body{

flex:1;

}

.username{

font-weight:bold;

color:#075E54;

margin-bottom:5px;

}

.text{

font-size:15px;

line-height:1.6;

}

.time{

margin
