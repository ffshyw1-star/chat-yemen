<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شات اليمن المطور</title>

<script src="/socket.io/socket.io.js"></script>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:tahoma;
background:#f5f5f5;
height:100vh;
display:flex;
flex-direction:column;

}


/* الشريط العلوي */

.top{

height:55px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;

}


.icons{

display:flex;
gap:12px;

}


.icon{

font-size:22px;
cursor:pointer;

}



/* اسم الغرفة */

.room-title{

background:white;
text-align:center;
padding:10px;
border-bottom:1px solid #ddd;

}



/* الرسائل */

.messages{

flex:1;
overflow-y:auto;
padding:10px;

}


.message{

display:flex;
gap:10px;
background:white;
padding:10px;
border-radius:12px;
margin-bottom:10px;

}



.avatar{

width:45px;
height:45px;
background:#ddd;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;

}



.name{

font-weight:bold;
cursor:pointer;

}



.time{

font-size:12px;
color:#777;

}



.system{

text-align:center;
padding:10px;
color:#555;

}



/* الكتابة */

.write{

background:#ddd;
padding:8px;
display:flex;
align-items:center;
gap:8px;

}


.write input{

flex:1;
border:0;
padding:12px;
border-radius:20px;

}


.send{

font-size:25px;
cursor:pointer;

}




/* المتواجدين */

.users-panel{

position:fixed;
right:-320px;
top:0;
height:100%;
width:300px;
background:white;
z-index:20;
transition:.3s;
box-shadow:0 0 10px #999;

}


.users-panel.open{

right:0;

}



.users-header{

background:#222;
color:white;
padding:15px;
display:flex;
justify-content:space-between;

}



.user-item{

display:flex;
align-items:center;
gap:10px;
padding:12px;
border-bottom:1px solid #ddd;
cursor:pointer;

}



.user-avatar{

width:45px;
height:45px;
background:#ddd;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;

}




/* السفلي */

.bottom{

height:55px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;

}



</style>

</head>



<body>



<!-- العلوي -->

<div class="top">


<div>
شات اليمن المطور
</div>



<div class="icons">

<span class="icon">☰</span>

<span class="icon">🛒</span>

<span class="icon">✉️</span>

<span class="icon"
onclick="openUsers()">
👥
</span>

<span class="icon">❤️</span>

<span class="icon">📭</span>

<span class="icon">👤</span>

</div>


</div>




<div class="room-title">

🌎 الغرفة

</div>




<!-- الرسائل -->


<div class="messages" id="messages">


</div>





<!-- الكتابة -->


<div class="write">


<span class="icon">
➕
</span>


<span class="icon">
😊
</span>



<input
id="messageInput"
placeholder="اكتب هنا..."
>



<span class="icon">
🎤
</span>



<span class="send"
onclick="sendMessage()">

➤

</span>



</div>




<!-- السفلي -->

<div class="bottom">

<span>🔊</span>

<span>▶️</span>

<span>
🌎
</span>

<span>⚙️</span>

<span>🏠</span>

<span onclick="openUsers()">
👥
</span>

</div>





<!-- نافذة المتواجدين -->


<div id="usersPanel"
class="users-panel">


<div class="users-header">

👥 المتواجدين

<span onclick="closeUsers()">
✖
</span>


</div>



<div id="usersList">

</div>


</div>







<script>


const socket = io();



const params =
new URLSearchParams(location.search);



const room =
params.get("room")
||
localStorage.getItem("room_id");



const username =
localStorage.getItem("username")
||
"زائر";





socket.emit(
"join_room",
{

room,

username

}

);





socket.on(
"receive_message",
(data)=>{


addMessage(
data.username,
data.message,
data.time
);


});





socket.on(
"system_message",
(msg)=>{


document
.getElementById("messages")
.innerHTML +=

`

<div class="system">

[ ${msg} ]

</div>

`;



});







function sendMessage(){


let input =
document.getElementById("messageInput");


let message =
input.value.trim();



if(!message)return;



socket.emit(
"send_message",
{

room,

username,

message

}

);



input.value="";


}







function addMessage(
name,
text,
time
){



let box =
document.getElementById("messages");



box.innerHTML +=

`

<div class="message">


<div class="avatar">
👤
</div>



<div>


<div class="name"
onclick="mention('${name}')">

${name}

</div>


<div>
${text}
</div>


<div class="time">

${time || getTime()}

</div>


</div>


</div>

`;



box.scrollTop =
box.scrollHeight;


}






function getTime(){


let d=new Date();


return d.getHours()
+
":"
+
String(d.getMinutes()).padStart(2,"0")
+
" "
+
d.getDate()
+
"/"
+
(d.getMonth()+1);


}







function mention(name){


document.getElementById(
"messageInput"
).value=name;


}






// قائمة المتواجدين


function openUsers(){

document
.getElementById("usersPanel")
.classList.add("open");

}



function closeUsers(){

document
.getElementById("usersPanel")
.classList.remove("open");

}




socket.on(
"online_users",
(users)=>{


let list =
document.getElementById("usersList");


list.innerHTML="";



users.forEach(user=>{


list.innerHTML +=

`

<div class="user-item"
onclick="mention('${user.username}')">


<div class="user-avatar">

👤

</div>


<div>

${user.username}

</div>


</div>

`;



});


});



</script>



</body>

</html>
