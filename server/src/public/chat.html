<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شات اليمن المطور</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Tajawal,Tahoma;
background:#f5f5f5;
height:100vh;
display:flex;
flex-direction:column;

}


/* الشريط العلوي */

.top{

height:55px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;

}


.top .icons{

display:flex;
gap:12px;

}


.icon{

font-size:22px;
cursor:pointer;

}


/* منطقة الدردشة */

.room-title{

text-align:center;
background:white;
padding:10px;
border-bottom:1px solid #ddd;

}


.messages{

flex:1;
overflow-y:auto;
padding:10px;

}


/* الرسائل */

.message{

background:white;
border-radius:12px;
padding:8px;
margin-bottom:10px;
display:flex;
gap:10px;

}


.avatar{

width:45px;
height:45px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;

}


.name{

font-weight:bold;
cursor:pointer;

}


.time{

font-size:12px;
color:#777;

}


.system{

text-align:center;
color:#555;
padding:8px;

}


/* الكتابة */

.write{

background:#ddd;
display:flex;
align-items:center;
padding:8px;
gap:8px;

}


.write input{

flex:1;
padding:12px;
border-radius:20px;
border:0;

}


.send{

font-size:25px;
cursor:pointer;

}


/* الشريط السفلي */

.bottom{

height:55px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;

}


</style>

</head>


<body>


<!-- الشريط العلوي -->

<div class="top">


<div>

شات اليمن المطور

</div>


<div class="icons">


<span class="icon">☰</span>

<span class="icon">🛒</span>

<span class="icon">✉️</span>

<span class="icon">👥</span>

<span class="icon">❤️</span>

<span class="icon">📭</span>

<span class="icon">👤</span>


</div>


</div>



<div class="room-title" id="roomName">

🌎 الغرفة

</div>



<!-- الرسائل -->


<div class="messages" id="messages">


</div>



<!-- الكتابة -->


<div class="write">


<span class="icon">
➕
</span>


<span class="icon">
😊
</span>


<input
id="messageInput"
placeholder="اكتب هنا..."
>


<span class="icon">
🎤
</span>


<span 
class="send"
onclick="sendMessage()">
➤
</span>


</div>



<!-- الشريط السفلي -->


<div class="bottom">


<span>🔊</span>

<span>▶️</span>

<span id="currentRoom">
🌎
</span>

<span>⚙️</span>

<span>🏠</span>

<span>👥</span>


</div>




<script>


const socket = io();



const params =
new URLSearchParams(location.search);


const room =
params.get("room");



const username =
localStorage.getItem("username")
||
"زائر";



// دخول الغرفة


socket.emit(
"join_room",
{
room,
username
}
);



// استقبال رسالة


socket.on(
"receive_message",
(data)=>{


addMessage(
data.username,
data.message,
data.time
);


});



// رسالة نظام


socket.on(
"system_message",
(msg)=>{


let box =
document.getElementById("messages");


box.innerHTML +=

`
<div class="system">
[ ${msg} ]
</div>
`;


box.scrollTop =
box.scrollHeight;


});



// إرسال


function sendMessage(){


let input =
document.getElementById("messageInput");


let text =
input.value.trim();



if(!text)return;



socket.emit(
"send_message",
{

room,
username,
message:text

}
);


input.value="";


}



// إضافة رسالة


function addMessage(
name,
text,
time
){


let box =
document.getElementById("messages");



box.innerHTML +=

`

<div class="message">


<div class="avatar">
👤
</div>


<div>

<div class="name"
onclick="mention('${name}')">

${name}

</div>


<div>
${text}
</div>


<div class="time">
${time || getTime()}
</div>


</div>


</div>

`;



box.scrollTop =
box.scrollHeight;


}




function getTime(){


let d =
new Date();


return d.getHours()
+
":"
+
String(d.getMinutes()).padStart(2,"0")
+
" "
+
d.getDate()
+
"/"
+
(d.getMonth()+1);


}



function mention(name){

document.getElementById(
"messageInput"
).value =
name;

}


</script>


</body>

</html>
