<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شات اليمن المطور</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Tajawal,Tahoma,Arial;
background:#f3f3f3;
height:100vh;
display:flex;
flex-direction:column;

}



/* الشريط العلوي */

.top-bar{

height:60px;
background:#202020;
color:white;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 10px;

}


.site-name{

font-size:18px;
font-weight:bold;

}



.top-icons{

display:flex;
gap:12px;

}



.icon{

font-size:23px;
cursor:pointer;

}





/* عنوان الغرفة */


.room-header{

background:white;

padding:10px;

text-align:center;

border-bottom:1px solid #ddd;

font-weight:bold;

}





/* منطقة الرسائل */


.messages{

flex:1;

overflow-y:auto;

padding:10px;

}





.message{

background:white;

border-radius:12px;

padding:8px;

margin-bottom:10px;

display:flex;

gap:10px;

align-items:flex-start;

}





.avatar{

width:45px;
height:45px;

border-radius:50%;

background:#ddd;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

}





.message-content{

flex:1;

}



.username{

font-weight:bold;

cursor:pointer;

}



.text{

margin-top:5px;

}



.time{

font-size:12px;

color:#777;

margin-top:5px;

}





.system-message{

text-align:center;

color:#555;

padding:8px;

}





/* شريط الكتابة */


.input-bar{

height:60px;

background:#ddd;

display:flex;

align-items:center;

gap:8px;

padding:8px;

}




.input-bar input{

flex:1;

height:42px;

border:none;

border-radius:22px;

padding:0 15px;

font-size:15px;

}




.send-btn{

font-size:25px;

cursor:pointer;

}





/* الشريط السفلي */


.bottom-bar{

height:55px;

background:white;

border-top:1px solid #ddd;

display:flex;

justify-content:space-around;

align-items:center;

}




.bottom-icon{

font-size:22px;

cursor:pointer;

}





/* قائمة المتواجدين */


.users-panel{

position:fixed;

right:-320px;

top:0;

width:300px;

height:100%;

background:white;

z-index:30;

transition:.3s;

box-shadow:0 0 10px #777;

}




.users-panel.open{

right:0;

}





.users-header{

background:#202020;

color:white;

padding:15px;

display:flex;

justify-content:space-between;

}





.user-item{

display:flex;

align-items:center;

gap:10px;

padding:12px;

border-bottom:1px solid #ddd;

cursor:pointer;

}





.user-image{

width:45px;

height:45px;

border-radius:50%;

background:#ddd;

display:flex;

align-items:center;

justify-content:center;

}





/* بوكس المستخدم */


.user-popup{

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:280px;

background:white;

border-radius:15px;

padding:20px;

display:none;

z-index:50;

box-shadow:0 0 15px #555;

text-align:center;

}





.popup-image{

width:80px;

height:80px;

border-radius:50%;

background:#ddd;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

}





.user-popup button{

width:100%;

padding:10px;

margin-top:8px;

border:none;

border-radius:8px;

cursor:pointer;

background:#eee;

}



</style>


</head>


<body>


<!-- الشريط العلوي -->

<div class="top-bar">


<div class="site-name">

شات اليمن المطور

</div>



<div class="top-icons">


<span class="icon">☰</span>

<span class="icon">🛒</span>

<span class="icon">✉️</span>

<span class="icon" onclick="openUsers()">
👥
</span>

<span class="icon">❤️</span>

<span class="icon">📭</span>

<span class="icon">👤</span>


</div>


</div>





<div class="room-header">

🌎 الغرفة العامة

</div>





<!-- الرسائل -->


<div id="messages" class="messages">


</div>





<!-- شريط الكتابة -->


<div class="input-bar">


<span class="icon">
➕
</span>


<span class="icon">
😊
</span>



<input id="messageInput"
placeholder="اكتب هنا...">



<span class="icon">
🎤
</span>



<span class="send-btn"
onclick="sendMessage()">

➤

</span>



</div>





<!-- الشريط السفلي -->


<div class="bottom-bar">


<span class="bottom-icon">
🔊
</span>


<span class="bottom-icon">
▶️
</span>


<span class="bottom-icon">
🌎
</span>


<span class="bottom-icon">
⚙️
</span>


<span class="bottom-icon">
🏠
</span>


<span class="bottom-icon"
onclick="openUsers()">

👥

</span>



</div>





<!-- نافذة المتواجدين -->


<div id="usersPanel"
class="users-panel">


<div class="users-header">

<span>
👥 المتواجدين
</span>


<span onclick="closeUsers()">
✖
</span>


</div>



<div id="usersList">

</div>


</div>





<!-- بوكس المستخدم -->


<div id="userPopup"
class="user-popup">


<div class="popup-image">

👤

</div>


<h3 id="popupName">

اسم المستخدم

</h3>


<div id="popupInfo">

20 سنة ذكر 🇾🇪

</div>



<button onclick="openProfile()">

👤 عرض الملف الشخصي

</button>



<button onclick="openPrivate()">

💬 رسالة

</button>



<button id="commandBtn"
style="display:none"
onclick="openCommand()">

⚡ الأمر

</button>



</div>
</body>
</html>
<script>


const socket = io();



const username =
localStorage.getItem("username")
||
"زائر";


const room =
localStorage.getItem("room_id")
||
1;



let selectedUser = "";




// دخول الغرفة

socket.emit(
"join_room",
{
room,
username
}
);





// استقبال الرسائل العامة

socket.on(
"receive_message",
(data)=>{


addMessage(
data.username,
data.message,
data.time
);


});






// رسائل النظام

socket.on(
"system_message",
(msg)=>{


const box =
document.getElementById("messages");



box.innerHTML +=

`

<div class="system-message">

[ ${msg} ]

</div>

`;



box.scrollTop =
box.scrollHeight;


});







// إرسال رسالة

function sendMessage(){


const input =
document.getElementById(
"messageInput"
);



const text =
input.value.trim();



if(!text)return;



socket.emit(
"send_message",
{

room,

username,

message:text

}

);



input.value="";


}







// إضافة رسالة للشاشة


function addMessage(
name,
text,
time
){


const box =
document.getElementById(
"messages"
);



box.innerHTML +=

`

<div class="message">


<div class="avatar">

👤

</div>



<div class="message-content">


<div class="username"
onclick="showUser('${name}')">

${name}

</div>



<div class="text">

${text}

</div>



<div class="time">

${time || getTime()}

</div>



</div>



</div>


`;



box.scrollTop =
box.scrollHeight;


}








function getTime(){


let d=new Date();



return (

String(d.getHours())
.padStart(2,"0")

+

":"

+

String(d.getMinutes())
.padStart(2,"0")

+

" "

+

d.getDate()

+

"/"

+

(d.getMonth()+1)

);



}







// =====================
// قائمة المتواجدين
// =====================



function openUsers(){


document
.getElementById(
"usersPanel"
)
.classList.add("open");


}



function closeUsers(){


document
.getElementById(
"usersPanel"
)
.classList.remove("open");


}





// استقبال المتواجدين


socket.on(
"online_users",
(users)=>{


const list =
document.getElementById(
"usersList"
);



list.innerHTML="";



users.forEach(
(user)=>{


list.innerHTML +=


`

<div class="user-item"
onclick="showUser('${user.username}')">


<div class="user-image">

👤

</div>



<div>

${user.username}

</div>


</div>


`;



});


});









// =====================
// بوكس المستخدم
// =====================


function showUser(name){


selectedUser=name;



document.getElementById(
"userPopup"
)
.style.display="block";



document.getElementById(
"popupName"
)
.innerHTML=name;



document.getElementById(
"popupInfo"
)
.innerHTML=

"20 سنة ذكر 🇾🇪";



}




// إغلاق البوكس بالضغط خارجه

document.addEventListener(
"click",
function(e){


let popup =
document.getElementById(
"userPopup"
);



if(
popup.style.display==="block"
&&
!popup.contains(e.target)
&&
!e.target.classList.contains("username")
){

popup.style.display="none";

}


});






// الملف الشخصي


function openProfile(){


location.href=

"profile.html?user="+selectedUser;


}






// الخاص


function openPrivate(){


location.href=

"private.html?user="+selectedUser;


}






// الأمر

function openCommand(){


alert(
"فتح أوامر الإدارة"
);


}







</script>


</body>

</html>
