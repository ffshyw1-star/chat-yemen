<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>شات اليمن المطور</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f2f2f2;
            font-family: tahoma, Arial;
        }

        .box {
            width: 90%;
            max-width: 360px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 20px #ccc;
        }

        .logo {
            font-size: 45px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
        }

        p {
            color: #777;
            margin-bottom: 20px;
        }

        /* تحويل الأزرار إلى روابط منسقة لضمان العمل على الجوال */
        .btn-link {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: 0;
            border-radius: 25px;
            font-size: 17px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .guest {
            background: #2196f3;
            color: white;
        }

        .login {
            background: #333;
            color: white;
        }

        .register {
            background: #eee;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="logo">💬</div>
        <h1>شات اليمن المطور</h1>
        <p>دردشة عربية سريعة وسهلة</p>

        <!-- تم الاعتماد على روابط تصفح حقيقية هنا لمنع أي حظر من المتصفحات -->
        <a href="/guest.html" class="btn-link guest">دخول الزوار</a>
        <a href="/login.html" class="btn-link login">دخول الأعضاء</a>
        <a href="/register.html" class="btn-link register">تسجيل حساب</a>
    </div>

</body>
</html>
