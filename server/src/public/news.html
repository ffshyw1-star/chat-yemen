<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>
المنشورات - شات اليمن المطور
</title>


<style>

body{

margin:0;

font-family:tahoma,Arial;

background:#f2f2f2;

}


.header{

background:#222;

color:white;

padding:15px;

text-align:center;

font-size:22px;

}


.post{

background:white;

margin:15px;

padding:15px;

border-radius:15px;

box-shadow:0 2px 5px #ccc;

}


.user{

font-weight:bold;

font-size:18px;

}


.text{

margin:15px 0;

font-size:17px;

}


.reactions{

display:flex;

justify-content:space-around;

border-top:1px solid #ddd;

padding-top:10px;

}


.reactions button{

border:0;

background:none;

font-size:22px;

cursor:pointer;

}


.count{

margin-bottom:10px;

font-size:15px;

}


</style>

</head>



<body>



<div class="header">

📰 المنشورات

</div>




<div id="posts">

جاري تحميل المنشورات...

</div>






<script>


const token =
localStorage.getItem("token");




// =====================
// جلب المنشورات
// =====================


async function loadPosts(){



let res =
await fetch("/api/posts");



let posts =
await res.json();




let box =
document.getElementById("posts");



box.innerHTML="";




posts.forEach(post=>{


box.innerHTML +=

`

<div class="post">


<div class="user">

👤 ${post.username}

</div>



<div class="text">

${post.content}

</div>



<div class="count"
id="count-${post.id}">

</div>




<div class="reactions">


<button onclick="react(${post.id},'👍')">

👍

</button>



<button onclick="react(${post.id},'🚫')">

🚫

</button>



<button onclick="react(${post.id},'❤️')">

❤️

</button>



<button onclick="react(${post.id},'😂')">

😂

</button>



</div>



</div>


`;



loadReactions(post.id);



});



}








// =====================
// إرسال التفاعل
// =====================


async function react(id,type){


await fetch(

"/api/reactions",

{

method:"POST",

headers:{


"Content-Type":
"application/json",


"Authorization":
"Bearer "+token


},


body:JSON.stringify({

post_id:id,

reaction:type

})


}

);



loadReactions(id);


}









// =====================
// جلب عدد التفاعلات
// =====================


async function loadReactions(id){


let res =
await fetch(

"/api/reactions/"+id

);



let data =
await res.json();



let html="";



data.forEach(item=>{


html +=

`

<span>

${item.reaction}

${item.count}

</span>

&nbsp;&nbsp;

`;


});



document.getElementById(
"count-"+id
)
.innerHTML=html;


}






// تشغيل

loadPosts();


</script>



</body>

</html>
