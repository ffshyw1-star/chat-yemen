<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>
المنشورات - شات اليمن المطور
</title>



<style>


body{

margin:0;

font-family:tahoma;

background:#f3f3f3;

}



.header{

background:#222;

color:white;

padding:15px;

text-align:center;

font-size:20px;

}



.post{

background:white;

margin:15px;

padding:15px;

border-radius:15px;

}



.user{

font-weight:bold;

}



.text{

margin:15px 0;

font-size:17px;

}




.reactions{

display:flex;

justify-content:space-around;

border-top:1px solid #ddd;

padding-top:10px;

}



.reaction{

cursor:pointer;

font-size:20px;

}



.count{

font-size:14px;

}



</style>


</head>



<body>



<div class="header">

📰 المنشورات

</div>




<div id="posts">


</div>






<script>


const token =
localStorage.getItem("token");




let posts=[


{

id:1,

user:"أبو محمد",

text:"مرحبا بالجميع في شات اليمن المطور"


},


{

id:2,

user:"اليمني",

text:"أهلاً وسهلاً بكم"


}


];








function loadPosts(){


let box =
document.getElementById(
"posts"
);



box.innerHTML="";



posts.forEach(post=>{


box.innerHTML +=

`

<div class="post">


<div class="user">

👤 ${post.user}

</div>


<div class="text">

${post.text}

</div>



<div id="count-${post.id}">

</div>



<div class="reactions">


<div class="reaction"
onclick="react(${post.id},'👍')">

👍

</div>



<div class="reaction"
onclick="react(${post.id},'🚫')">

🚫

</div>



<div class="reaction"
onclick="react(${post.id},'❤️')">

❤️

</div>



<div class="reaction"
onclick="react(${post.id},'😂')">

😂

</div>



</div>


</div>


`;



loadReactions(post.id);



});



}







async function react(id,type){


await fetch(

"/api/reactions",

{


method:"POST",

headers:{


"Content-Type":
"application/json",


"Authorization":
"Bearer "+token


},


body:JSON.stringify({

post_id:id,

reaction:type

})


}

);



loadReactions(id);


}









async function loadReactions(id){


let res =
await fetch(

"/api/reactions/"+id

);



let data =
await res.json();



let html="";



data.forEach(item=>{


html +=

`

<span>

${item.reaction}

${item.count}

</span>

&nbsp;

`;


});




document.getElementById(
"count-"+id
)
.innerHTML=html;


}






loadPosts();


</script>


</body>

</html>
