<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>الخاص</title>

<script src="/socket.io/socket.io.js"></script>


<style>

body{

margin:0;
font-family:tahoma;
background:#f5f5f5;
height:100vh;
display:flex;
flex-direction:column;

}


.header{

height:60px;
background:#222;
color:white;
display:flex;
align-items:center;
padding:0 15px;
gap:10px;

}



.chat{

flex:1;
padding:10px;
overflow:auto;

}



.msg{

max-width:75%;
padding:10px;
margin:10px;
border-radius:12px;

}



.other{

background:white;
margin-left:auto;

}



.me{

background:#d9fdd3;
margin-right:auto;

}



.name{

font-weight:bold;

}



.time{

font-size:12px;
color:#777;

}



.input{

display:flex;
padding:8px;
background:#ddd;
gap:8px;

}



.input input{

flex:1;
border:0;
border-radius:20px;
padding:12px;

}


.send{

font-size:25px;

}



</style>


</head>


<body>



<div class="header">

← 💬 خاص مع

<span id="targetName">
المستخدم
</span>

</div>




<div id="messages"
class="chat">

</div>





<div class="input">


<span>
😊
</span>


<span>
➕
</span>



<input
id="text"
placeholder="اكتب هنا..."
>



<span>
🎤
</span>



<span class="send"
onclick="send()">

➤

</span>



</div>






<script>


const socket = io();



const target =
new URLSearchParams(
location.search
)
.get("user");



const username =
localStorage.getItem("username")
||
"زائر";



document.getElementById(
"targetName"
)
.innerHTML =
target;



// فتح الخاص

socket.emit(
"open_private",
{

userId:username,

targetId:target

}

);




// استقبال الرسائل

socket.on(
"receive_private_message",
(data)=>{


addMessage(
data.senderId,
data.message,
data.time
);



});





function send(){


let input =
document.getElementById("text");


let message =
input.value.trim();



if(!message)
return;



socket.emit(
"send_private_message",
{

senderId:username,

receiverId:target,

message

}

);



input.value="";


}




function addMessage(
sender,
text,
time
){



let box =
document.getElementById(
"messages"
);



let type =
sender==username
?
"me"
:
"other";



box.innerHTML +=

`

<div class="msg ${type}">


<div class="name">

${sender}

</div>


<div>

${text}

</div>


<div class="time">

${time || getTime()}

</div>


</div>

`;



box.scrollTop =
box.scrollHeight;


}




function getTime(){


let d=new Date();


return (

d.getHours()
+
":"
+
String(d.getMinutes())
.padStart(2,"0")
+
" "
+
d.getDate()
+
"/"
+
(d.getMonth()+1)

);


}



</script>



</body>

</html>
