<!DOCTYPE html>
<html lang="ar" dir="rtl">


<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
تسجيل حساب
</title>


<style>

body{

font-family:tahoma;
background:#eee;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}


.box{

background:white;
width:320px;
padding:25px;
border-radius:15px;
text-align:center;

}


input,button{

width:100%;
padding:12px;
margin:8px 0;

}


button{

background:#673ab7;
color:white;
border:0;
border-radius:8px;

}

</style>


</head>


<body>


<div class="box">


<h2>
إنشاء حساب
</h2>


<input
id="username"
placeholder="اسم المستخدم">


<input
id="password"
type="password"
placeholder="كلمة المرور">


<input
id="email"
placeholder="البريد الإلكتروني">


<button onclick="register()">

إنشاء حساب

</button>


</div>




<script>


async function register(){


let username =
document.getElementById("username").value;


let password =
document.getElementById("password").value;


let email =
document.getElementById("email").value;



let res =
await fetch("/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
email

})

});



let data =
await res.json();



if(data.message){


alert(data.message);


location.href="login.html";


}else{


alert(data.error);


}


}



</script>


</body>
</html>
