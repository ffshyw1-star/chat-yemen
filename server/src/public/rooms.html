<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>الغرف</title>


<style>

body{
font-family:tahoma;
background:#eee;
}


.room{

background:white;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;

}


button{

padding:10px;
border:0;
border-radius:8px;

}


</style>

</head>


<body>


<h2>
شات اليمن المطور
</h2>


<div id="rooms"></div>



<script>


async function loadRooms(){


let res =
await fetch("/api/rooms");


let data =
await res.json();



let box =
document.getElementById("rooms");



data.forEach(room=>{


box.innerHTML +=

`

<div class="room">

<h3>
${room.name}
</h3>


<p>
اضغط هنا للدخول
</p>


<button onclick="joinRoom(${room.id})">

دخول

</button>


</div>

`;


});


}



function joinRoom(id){


location.href=
"chat.html?room="+id;


}



loadRooms();



</script>


</body>
</html>
